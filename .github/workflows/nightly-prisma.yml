name: Nightly (Prisma pre-release channels)

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  track:
    name: ${{ matrix.channel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [dev, alpha, beta, rc]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Try to install Prisma@${{ matrix.channel }}
        id: install-prisma
        continue-on-error: true
        run: |
          set -euo pipefail
          pnpm add -D "@prisma/client@${{ matrix.channel }}" "prisma@${{ matrix.channel }}" \
            || echo "channel-missing=true" >> "$GITHUB_OUTPUT"

      - name: Skip if channel has no release
        if: steps.install-prisma.outputs.channel-missing == 'true'
        run: echo "No @${{ matrix.channel }} tag published — nothing to test."

      - run: pnpm prisma generate
        if: steps.install-prisma.outputs.channel-missing != 'true'
      - run: pnpm typecheck
        if: steps.install-prisma.outputs.channel-missing != 'true'
      - run: pnpm test:unit
        if: steps.install-prisma.outputs.channel-missing != 'true'
      - run: pnpm test:integration
        if: steps.install-prisma.outputs.channel-missing != 'true'
        env:
          TEST_DB_IMAGE: mysql:8.0

      - name: Open issue on failure
        if: failure() && steps.install-prisma.outputs.channel-missing != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const title = `upstream-break: Prisma@${{ matrix.channel }} fails our tests`;
            const body = `Nightly run ${context.runId} failed against \`@prisma/client@${{ matrix.channel }}\`.
            See: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({ owner, repo, title, body, labels: ['upstream-break'] });
