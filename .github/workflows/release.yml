name: Release

# Triggered manually (`workflow_dispatch`) so an unprovisioned npm registry
# doesn't break every push to main. When a maintainer wants to cut a release:
#   1. Land the relevant changeset(s) via PR
#   2. Trigger this workflow from the Actions tab
#   3. changesets/action opens the versioning PR (or publishes if the
#      versioning PR was already merged)
on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    name: Changesets → npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          # Intentionally NO `registry-url:` here. setup-node injects a line
          # like `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` into
          # the runner's .npmrc whenever registry-url is set, even if no
          # token is supplied. With trusted publishing (no NPM_TOKEN), that
          # placeholder expands to an empty value, npm sends a broken bearer
          # header, and the OIDC fallback never gets reached — registry just
          # responds 404. Letting npm see no _authToken at all is what makes
          # it negotiate via the OIDC token exchange instead.

      # npm 11.5+ is required for OIDC trusted publishing — earlier
      # versions don't auto-detect ACTIONS_ID_TOKEN_REQUEST_URL and fail
      # with ENEEDAUTH instead of negotiating an OIDC token. Node 24 ships
      # with npm 11+; pin to latest to be safe across runner image churn.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build
      - run: pnpm test:unit
      - run: pnpm test:property

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — auth is via npm trusted publishing (OIDC) using
          # the workflow's `id-token: write` permission and the trusted
          # publisher entry on the npm package's settings page.
          NPM_CONFIG_PROVENANCE: 'true'
