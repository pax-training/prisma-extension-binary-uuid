name: Release

# Triggered manually (`workflow_dispatch`) so an unprovisioned npm registry
# doesn't break every push to main. When a maintainer wants to cut a release:
#   1. Land the relevant changeset(s) via PR
#   2. Trigger this workflow from the Actions tab
#   3. changesets/action opens the versioning PR (or publishes if the
#      versioning PR was already merged)
on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    name: Changesets → npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build
      - run: pnpm test:unit
      - run: pnpm test:property

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
